<!doctype html>

<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>RainbowFitness — Treino Interativo</title>

  <!-- Manifest PWA -->

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ff5f6d">

  <style>
    :root{--card-bg: rgba(255,255,255,0.92); --accent: rgba(0,0,0,0.7);}
    html,body{height:100%;margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,'Helvetica Neue',Arial}
    body{background: linear-gradient(120deg,#ff5f6d 0%,#ffc371 20%,#fff76b 35%,#8cf56b 50%,#5fe3ff 65%,#8a7bff 80%,#ff7bdb 100%); display:flex;align-items:center;justify-content:center;padding:24px;color:#111;}
    .app{width:100%;max-width:920px;background:var(--card-bg);border-radius:18px;box-shadow:0 10px 30px rgba(0,0,0,0.18);overflow:hidden;backdrop-filter: blur(6px);}
    header{padding:18px 24px;display:flex;align-items:center;gap:16px}
    .logo{width:56px;height:56px;border-radius:12px;background-image:url('icons/logo.png');background-size:cover;background-position:center;}
    h1{margin:0;font-size:20px}
    p.lead{margin:0;color:var(--accent);font-size:13px}
    main{padding:18px 24px}
    .days{display:grid;grid-template-columns:1fr;gap:12px}
    @media(min-width:820px){.days{grid-template-columns:repeat(2,1fr)}}
    .day-card{background:linear-gradient(180deg,rgba(255,255,255,0.98),rgba(255,255,255,0.9));border-radius:12px;padding:12px;border:1px solid rgba(0,0,0,0.05)}
    .day-head{display:flex;align-items:center;justify-content:space-between;gap:12px}
    .day-title{display:flex;align-items:center;gap:12px}
    .dot{width:12px;height:12px;border-radius:4px}
    .day-meta{font-size:13px;color:var(--accent)}
    .ex-list{margin-top:10px;padding-top:10px;border-top:1px dashed rgba(0,0,0,0.04)}
    .ex{display:flex;align-items:center;gap:12px;padding:8px 4px}
    .ex label{flex:1;cursor:pointer}
    .tick{width:36px;height:36px;border-radius:8px;border:1px solid rgba(0,0,0,0.06);display:flex;align-items:center;justify-content:center;cursor:pointer}
    .tick.checked{background:linear-gradient(90deg,#6ee7b7,#34d399);color:white;border:none}
    .controls{display:flex;gap:10px;align-items:center;margin-top:12px;flex-wrap:wrap}
    .btn{padding:8px 12px;border-radius:10px;border:none;cursor:pointer;font-weight:600}
    .btn.ghost{background:transparent;border:1px solid rgba(0,0,0,0.06)}
    .btn.primary{background:#111;color:white}
    .footer{padding:14px 24px;background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.04));font-size:13px;color:var(--accent);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap}
    .small{font-size:12px;color:#555}
    .badge{background:rgba(0,0,0,0.06);padding:6px 8px;border-radius:999px;font-weight:700}
    input[type='checkbox']{display:none}
    .toast{position:fixed;right:20px;bottom:20px;background:#111;color:#fff;padding:10px 14px;border-radius:10px;opacity:0;transform:translateY(12px);transition:all .25s}
    .toast.show{opacity:1;transform:translateY(0)}
  </style>

</head>
<body>
<div class="app">
  <header>
    <div class="logo"></div>
    <div>
      <h1>RainbowFitness — Treino Interativo</h1>
      <p class="lead">Segunda a Sexta — Quarta e Sexta: pernas/glúteos. Clique para marcar ✅ ou editar exercícios.</p>
    </div>
    <div style="margin-left:auto;display:flex;gap:8px;align-items:center">
      <div class="badge" id="weekBadge">Semana: 1</div>
      <button class="btn ghost" id="installBtn" style="display:none">Instalar App</button>
    </div>
  </header>

  <main>
    <div class="controls">
      <button class="btn primary" id="clearAll">Limpar marcações</button>
      <button class="btn ghost" id="exportBtn">Exportar progresso</button>
      <button class="btn ghost" id="importBtn">Importar</button>
      <button class="btn ghost" id="addEx">➕ Adicionar exercício</button>
      <input type="file" id="importFile" accept="application/json" style="display:none" />
    </div>
    <section class="days" id="days"></section>
  </main>
  <footer class="footer">
    <div class="small">Feito com ❤️ RainbowFitness</div>
    <div class="small">Progresso salvo localmente</div>
  </footer>
</div>
<div class="toast" id="toast">Salvo!</div>

<script>
const TREINO = {
  'Segunda — Peito/Ombro/Tríceps':['Supino reto','Supino inclinado','Crucifixo','Desenvolvimento ombro','Elevação lateral','Tríceps corda'],
  'Terça — Costas/Bíceps':['Puxada frente','Remada baixa','Remada unilateral','Pulldown','Rosca direta'],
  'Quarta — Glúteos/Posteriores':['Agachamento','Leg press','Mesa flexora','Stiff barra','Hip thrust','Cadeira abdutora'],
  'Quinta — Ombro e Core':['Arnold','Elevação lateral','Elevação frontal','Remada alta','Prancha'],
  'Sexta — Glúteos/Posteriores':['Agachamento sumô','Avanço','Cadeira extensora','Stiff romeno','Hip thrust unilateral','Glúteo 4 apoios']
};
const STORAGE_KEY='rainbowfitness_progress_v1';
const daysEl=document.getElementById('days');
const toast=document.getElementById('toast');

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function showToast(msg='Salvo!'){toast.textContent=msg;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),1300);}
function loadProgress(){try{const raw=localStorage.getItem(STORAGE_KEY);return raw?JSON.parse(raw):{}}catch(e){return{}}}
function saveProgress(obj){localStorage.setItem(STORAGE_KEY,JSON.stringify(obj));showToast('Progresso salvo')}

function build(){
  const progress=loadProgress();
  daysEl.innerHTML='';
  Object.entries(TREINO).forEach(([day,exs],idx)=>{
    const card=document.createElement('article');card.className='day-card';
    const head=document.createElement('div');head.className='day-head';
    const titleWrap=document.createElement('div');titleWrap.className='day-title';
    const dot=document.createElement('div');dot.className='dot';const colors=['#ff5f6d','#ffc371','#fff76b','#8cf56b','#5fe3ff'];dot.style.background=colors[idx%colors.length];
    const title=document.createElement('div');title.innerHTML='<strong>'+day+'</strong><div class="day-meta">'+exs.length+' exercícios</div>';
    titleWrap.appendChild(dot);titleWrap.appendChild(title);head.appendChild(titleWrap);
    const expandBtn=document.createElement('button');expandBtn.className='btn ghost';expandBtn.textContent='Expandir';head.appendChild(expandBtn);
    card.appendChild(head);
    const exList=document.createElement('div');exList.className='ex-list';exList.style.display='none';

    exs.forEach((ex,i)=>{
      const id=uid();
      const row=document.createElement('div');row.className='ex';
      const chk=document.createElement('input');chk.type='checkbox';chk.id=id;
      const lbl=document.createElement('label');lbl.htmlFor=id;lbl.innerText=ex;
      const tick=document.createElement('div');tick.className='tick';tick.title='Marcar como feito';
      const delBtn=document.createElement('button');delBtn.textContent='🗑️';delBtn.style.cursor='pointer';
      const dayKey=day;
      if(progress[dayKey]&&progress[dayKey][ex]){chk.checked=true;tick.classList.add('checked');tick.innerHTML='✓';}
      tick.addEventListener('click',()=>{chk.checked=!chk.checked;chk.dispatchEvent(new Event('change'))});
      chk.addEventListener('change',()=>{if(chk.checked){tick.classList.add('checked');tick.innerHTML='✓'}else{tick.classList.remove('checked');tick.innerHTML=''};const cur=loadProgress();cur[dayKey]=cur[dayKey]||{};cur[dayKey][ex]=chk.checked;saveProgress(cur);});
      lbl.addEventListener('click',()=>{const newName=prompt('Editar exercício:',ex);if(newName){TREINO[day][i]=newName;build();}});
      delBtn.addEventListener('click',()=>{if(confirm('Excluir exercício?')){TREINO[day].splice(i,1);build();}});
      row.appendChild(chk);row.appendChild(lbl);row.appendChild(tick);row.appendChild(delBtn);exList.appendChild(row);
    });

    expandBtn.addEventListener('click',()=>{exList.style.display = exList.style.display==='none'?'block':'none';expandBtn.textContent=exList.style.display==='none'?'Expandir':'Recolher';});
    card.appendChild(exList);daysEl.appendChild(card);
  });
}

document.getElementById('clearAll').addEventListener('click',()=>{if(confirm('Limpar todas as marcações?')){localStorage.removeItem(STORAGE_KEY);build();showToast('Marcações limpas')}});
document.getElementById('exportBtn').addEventListener('click',()=>{const data=loadProgress();const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='rainbowfitness_progresso.json';document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);});
document.getElementById('importBtn').addEventListener('click',()=>{document.getElementById('importFile').click()});
document.getElementById('importFile').addEventListener('change',async(e)=>{const file=e.target.files[0];if(!file) return; try{const text=await file.text();const parsed=JSON.parse(text);localStorage.setItem(STORAGE_KEY,JSON.stringify(parsed));build();showToast('Progresso importado')}catch(err){alert('Arquivo inválido')} e.target.value='';});
document.getElementById('addEx').addEventListener('click',()=>{
  const day=prompt('Digite o dia do treino:');if(!day||!TREINO[day]) return alert('Dia inválido!');
  const exName=prompt('Nome do exercício + séries:');if(!exName) return;
  TREINO[day].push(exName);build();
});

build();

// PWA Install Prompt
let deferredPrompt;
window.addEventListener('beforeinstallprompt',(e)=>{
  e.preventDefault();
  deferredPrompt=e;
  const installBtn=document.getElementById('installBtn');installBtn.style.display='block';
  installBtn.addEventListener('click',()=>{
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(()=>{deferredPrompt=null;});
  });
});

// Service Worker
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').then(()=>console.log('Service Worker registrado!'))}
</script>

</body>
</html>
