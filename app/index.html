<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0">
  <title>RainbowFitness — Pro</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ff5f6d">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">

  <style>
    :root { 
      --card-bg: rgba(255,255,255,0.92); 
      --accent: rgba(0,0,0,0.7); 
    }
    
    html, body { margin: 0; padding: 0; min-height: 100vh; font-family: Inter, system-ui, sans-serif; }
    
    body {
      background: linear-gradient(-45deg, #ff4d4d,#ff944d,#ffe44d,#4dff88,#4dd2ff,#b84dff);
      background-size: 400% 400%;
      animation: gradient 15s ease infinite;
      display: flex; flex-direction: column; align-items: center; padding: 20px; box-sizing: border-box;
    }

    @keyframes gradient { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

    .app {
      width: 100%; max-width: 920px; background: var(--card-bg);
      border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.18);
      overflow: hidden; backdrop-filter: blur(10px); margin-bottom: 40px;
    }

    /* PERFIL */
    .profile-header {
      padding: 15px 24px; display: flex; align-items: center; gap: 16px;
      background: rgba(255,255,255,0.3); border-bottom: 1px solid rgba(0,0,0,0.05);
    }
    .avatar-wrapper {
      width: 55px; height: 55px; border-radius: 15px; overflow: hidden;
      background: #eee; border: 2px solid white; cursor: pointer;
    }
    .avatar-wrapper img { width: 100%; height: 100%; object-fit: cover; }
    .user-info input { background: transparent; border: none; font-size: 18px; font-weight: 800; color: #111; outline: none; width: 100%; }

    /* NAVEGAÇÃO (TABS) */
    .tabs { display: flex; gap: 10px; padding: 10px 24px; background: rgba(255,255,255,0.2); }
    .tab-btn { 
      flex: 1; padding: 12px; border: none; border-radius: 12px; 
      font-weight: bold; cursor: pointer; transition: 0.3s; background: rgba(0,0,0,0.05); 
    }
    .tab-btn.active { background: white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

    main { padding: 20px 24px; }
    .page { display: none; }
    .page.active { display: block; }

    /* CARDS */
    .card { background: white; border-radius: 18px; padding: 18px; margin-bottom: 15px; border: 1px solid rgba(0,0,0,0.03); }
    .card h2 { margin: 0 0 10px 0; font-size: 18px; color: #111; display: flex; justify-content: space-between; align-items: center; }
    
    /* ESTILO NUTRIÇÃO */
    .meal-row { display: flex; gap: 10px; margin-bottom: 8px; font-size: 14px; align-items: baseline; }
    .meal-row b { min-width: 80px; color: #555; }
    .meal-input { flex: 1; border: none; border-bottom: 1px dashed #ddd; outline: none; padding: 2px 0; font-family: inherit; font-size: 14px; background: transparent; }
    .meal-input:focus { border-bottom-color: #ff5f6d; background: #fffdfd; }
    
    /* ESTILO TREINO */
    .ex-item { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid #f5f5f5; }
    .tick { width: 32px; height: 32px; border-radius: 10px; border: 2px solid #eee; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
    .tick.checked { background: #4ade80; border-color: #4ade80; color: white; }

    .btn { padding: 10px 16px; border-radius: 10px; border: none; cursor: pointer; font-weight: 600; transition: 0.2s; }
    .btn-primary { background: #111; color: white; }
    .btn-ghost { background: white; border: 1px solid #ddd; }

    .footer { padding: 15px 24px; font-size: 11px; color: var(--accent); display: flex; justify-content: space-between; border-top: 1px solid rgba(0,0,0,0.03); }
    .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #111; color: #fff; padding: 10px 20px; border-radius: 50px; opacity: 0; transition: 0.3s; pointer-events: none; z-index: 9999; }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

<div class="app">
  <div class="profile-header">
    <div class="avatar-wrapper" onclick="document.getElementById('photoInput').click()">
      <img id="userPhoto" src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix">
    </div>
    <input type="file" id="photoInput" hidden accept="image/*">
    <div class="user-info">
      <input type="text" id="userName" value="Seu Nome">
    </div>
  </div>

  <nav class="tabs">
    <button class="tab-btn active" onclick="switchPage('treino', this)">💪 Treinos</button>
    <button class="tab-btn" onclick="switchPage('nutri', this)">🥗 Nutrição</button>
  </nav>

  <main>
    <div id="page-treino" class="page active">
      <div style="display:flex; gap:10px; margin-bottom:15px;">
        <button class="btn btn-primary" onclick="resetChecks()">Zerar Checks</button>
        <button class="btn btn-ghost" onclick="addEx()">➕ Adicionar</button>
      </div>
      <div id="treino-content"></div>
    </div>

    <div id="page-nutri" class="page">
      <div id="nutri-content"></div>
    </div>
  </main>

  <footer class="footer">
    <div>RainbowFitness Pro</div>
    <div>Planejamento Integrado</div>
  </footer>
</div>

<div class="toast" id="toast">Salvo!</div>

<script>
// --- BANCO DE DATOS ---
const DB_KEY = 'rf_integrated_db_v1';
let db = JSON.parse(localStorage.getItem(DB_KEY)) || {
  user: { name: "Seu Nome", photo: "https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" },
  treino: {
    'Segunda — Peito/Ombro/Tríceps':['Supino reto','Supino inclinado','Crucifixo','Desenvolvimento','Elevação lateral','Tríceps corda'],
    'Terça — Costas/Bíceps':['Puxada frente','Remada baixa','Remada unilateral','Pulldown','Rosca direta'],
    'Quarta — Glúteos/Posteriores':['Agachamento','Leg press','Mesa flexora','Stiff','Elevação pélvica'],
    'Quinta — Ombro e Core':['Arnold','Elevação lateral','Elevação frontal','Remada alta','Prancha'],
    'Sexta — Glúteos/Posteriores':['Agachamento sumô','Avanço','Extensora','Stiff romeno','Hip thrust']
  },
  progresso: {},
  nutri: {
    'Segunda': { cafe: '3 ovos + aveia + banana', almoco: 'frango + arroz + feijão + salada', pre: 'banana + aveia', jantar: 'sanduíche de frango' },
    'Terça': { cafe: 'omelete + pão integral', almoco: 'carne moída + batata + salada', pre: 'iogurte + aveia', jantar: 'tacos saudáveis' },
    'Quarta': { cafe: 'ovos + aveia + banana', almoco: 'peixe + arroz + feijão', pre: 'banana + café', jantar: 'omelete + salada' },
    'Quinta': { cafe: 'iogurte + aveia + banana', almoco: 'frango + arroz + feijão', pre: 'banana', jantar: 'tacos de carne' },
    'Sexta': { cafe: 'ovos + aveia', almoco: 'carne + batata + salada', pre: 'banana + aveia', jantar: 'sanduíche proteico' },
    'Sábado': { cafe: 'omelete + pão integral', almoco: 'churrasco moderado + salada', pre: 'Livre', jantar: 'tacos ou sanduíche' },
    'Domingo': { cafe: 'ovos + aveia + banana', almoco: 'peixe ou frango + arroz', pre: 'Livre', jantar: 'Omelete leve' }
  }
};

function save() {
  db.user.name = document.getElementById('userName').value;
  localStorage.setItem(DB_KEY, JSON.stringify(db));
  const t = document.getElementById('toast'); t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1500);
}

// --- NAVEGAÇÃO ---
function switchPage(id, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  btn.classList.add('active');
}

// --- RENDERIZAR TREINO ---
function renderTreino() {
  const container = document.getElementById('treino-content');
  container.innerHTML = '';
  Object.entries(db.treino).forEach(([day, exs]) => {
    const card = document.createElement('div'); card.className = 'card';
    const exsHtml = exs.map(ex => {
      const checked = db.progresso[day] && db.progresso[day][ex];
      return `<div class="ex-item">
        <label style="flex:1">${ex}</label>
        <div class="tick ${checked?'checked':''}" onclick="toggleEx('${day}', '${ex}', this)">${checked?'✓':''}</div>
      </div>`;
    }).join('');
    card.innerHTML = `<h2 onclick="toggleCollapse(this)">${day} <span>▼</span></h2><div style="display:none">${exsHtml}</div>`;
    container.appendChild(card);
  });
}

function toggleEx(day, ex, el) {
  db.progresso[day] = db.progresso[day] || {};
  const active = !el.classList.contains('checked');
  el.classList.toggle('checked'); el.innerHTML = active ? '✓' : '';
  db.progresso[day][ex] = active; save();
}

function toggleCollapse(el) {
  const content = el.nextElementSibling;
  content.style.display = content.style.display === 'none' ? 'block' : 'none';
}

// --- RENDERIZAR NUTRIÇÃO ---
function renderNutri() {
  const container = document.getElementById('nutri-content');
  container.innerHTML = '';
  Object.entries(db.nutri).forEach(([day, meals]) => {
    const card = document.createElement('div'); card.className = 'card';
    card.innerHTML = `
      <h2>${day}</h2>
      <div class="meal-row"><b>Café:</b><input class="meal-input" value="${meals.cafe}" onblur="updateNutri('${day}', 'cafe', this.value)"></div>
      <div class="meal-row"><b>Almoço:</b><input class="meal-input" value="${meals.almoco}" onblur="updateNutri('${day}', 'almoco', this.value)"></div>
      <div class="meal-row"><b>Pré:</b><input class="meal-input" value="${meals.pre}" onblur="updateNutri('${day}', 'pre', this.value)"></div>
      <div class="meal-row"><b>Jantar:</b><input class="meal-input" value="${meals.jantar}" onblur="updateNutri('${day}', 'jantar', this.value)"></div>
    `;
    container.appendChild(card);
  });
}

function updateNutri(day, meal, val) { db.nutri[day][meal] = val; save(); }

// --- PERFIL ---
document.getElementById('userName').value = db.user.name;
document.getElementById('userPhoto').src = db.user.photo;
document.getElementById('photoInput').onchange = e => {
  const r = new FileReader();
  r.onload = () => { db.user.photo = r.result; document.getElementById('userPhoto').src = r.result; save(); };
  r.readAsDataURL(e.target.files[0]);
};
document.getElementById('userName').onblur = save;

function resetChecks() { if(confirm("Zerar todos os exercícios?")) { db.progresso = {}; renderTreino(); save(); } }
function addEx() {
  const day = prompt("Qual dia?"); if(!db.treino[day]) return alert("Dia não encontrado!");
  const name = prompt("Nome do exercício:"); if(name) { db.treino[day].push(name); renderTreino(); save(); }
}

if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
renderTreino(); renderNutri();
</script>
</body>
</html>
