<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>RainbowFitness — Treino Interativo</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ff5f6d">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">

  <style>
    :root { --card-bg: rgba(255,255,255,0.92); --accent: rgba(0,0,0,0.7); }
    
    /* CORREÇÃO DE ROLAGEM ANDROID */
    html, body { 
      margin: 0; 
      padding: 0; 
      min-height: 100vh;
      font-family: Inter, system-ui, sans-serif;
    }
    
    body {
      background: linear-gradient(120deg,#ff5f6d 0%,#ffc371 20%,#fff76b 35%,#8cf56b 50%,#5fe3ff 65%,#8a7bff 80%,#ff7bdb 100%);
      background-attachment: fixed;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      box-sizing: border-box;
    }

    .app {
      width: 100%;
      max-width: 920px;
      background: var(--card-bg);
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.18);
      backdrop-filter: blur(6px);
      margin-bottom: 40px;
    }

    header { padding: 18px 24px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
    .logo { width: 56px; height: 56px; border-radius: 12px; background: #eee url('icons/logo.png') center/cover; }
    h1 { margin: 0; font-size: 20px; }
    p.lead { margin: 0; color: var(--accent); font-size: 13px; }
    
    main { padding: 18px 24px; }
    .days { display: grid; grid-template-columns: 1fr; gap: 12px; }
    @media(min-width:820px) { .days { grid-template-columns: repeat(2, 1fr); } }

    .day-card { background: white; border-radius: 12px; padding: 12px; border: 1px solid rgba(0,0,0,0.05); }
    .day-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .day-title { display: flex; align-items: center; gap: 12px; }
    .dot { width: 12px; height: 12px; border-radius: 4px; }
    
    .ex-list { margin-top: 10px; padding-top: 10px; border-top: 1px dashed rgba(0,0,0,0.1); }
    .ex { display: flex; align-items: center; gap: 12px; padding: 10px 4px; border-bottom: 1px solid rgba(0,0,0,0.03); }
    .ex label { flex: 1; cursor: pointer; font-size: 14px; }
    
    .tick { width: 36px; height: 36px; border-radius: 8px; border: 1px solid #ddd; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
    .tick.checked { background: #34d399; color: white; border: none; }
    
    .controls { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 15px; }
    .btn { padding: 10px 14px; border-radius: 10px; border: none; cursor: pointer; font-weight: 600; font-size: 13px; }
    .btn.ghost { background: white; border: 1px solid #ddd; }
    .btn.primary { background: #111; color: white; }
    
    .footer { padding: 14px 24px; font-size: 12px; color: var(--accent); display: flex; justify-content: space-between; }
    .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #111; color: #fff; padding: 12px 20px; border-radius: 50px; opacity: 0; transition: 0.3s; pointer-events: none; }
    .toast.show { opacity: 1; }
    input[type='checkbox'] { display: none; }
  </style>
</head>
<body>

<div class="app">
  <header>
    <div class="logo"></div>
    <div style="flex:1">
      <h1>RainbowFitness</h1>
      <p class="lead">Clique no exercício para marcar ou no nome para editar.</p>
    </div>
    <button class="btn primary" id="installBtn" style="display:none">Instalar App</button>
  </header>

  <main>
    <div class="controls">
      <button class="btn primary" id="clearAll">Zerar Checks</button>
      <button class="btn ghost" id="addEx">➕ Novo Exercício</button>
      <button class="btn ghost" id="exportBtn">Exportar</button>
      <button class="btn ghost" id="importBtn">Importar</button>
      <input type="file" id="importFile" accept="application/json" style="display:none" />
    </div>
    <section class="days" id="days"></section>
  </main>

  <footer class="footer">
    <div>Feito com ❤️ RainbowFitness</div>
    <div>Salvo Localmente</div>
  </footer>
</div>

<div class="toast" id="toast">Salvo!</div>

<script>
// Dados Iniciais
const DEFAULT_TREINO = {
  'Segunda — Peito/Ombro/Tríceps':['Supino reto','Supino inclinado','Crucifixo','Desenvolvimento ombro','Elevação lateral','Tríceps corda'],
  'Terça — Costas/Bíceps':['Puxada frente','Remada baixa','Remada unilateral','Pulldown','Rosca direta'],
  'Quarta — Glúteos/Posteriores':['Agachamento','Leg press','Mesa flexora','Stiff barra','Hip thrust','Cadeira abdutora'],
  'Quinta — Ombro e Core':['Arnold','Elevação lateral','Elevação frontal','Remada alta','Prancha'],
  'Sexta — Glúteos/Posteriores':['Agachamento sumô','Avanço','Cadeira extensora','Stiff romeno','Hip thrust unilateral','Glúteo 4 apoios']
};

const STORAGE_KEY = 'rainbowfitness_progress_v1';
const CONFIG_KEY = 'rainbowfitness_config_v1'; // Salva os nomes dos exercícios

let TREINO = JSON.parse(localStorage.getItem(CONFIG_KEY)) || DEFAULT_TREINO;
const daysEl = document.getElementById('days');

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 1500);
}

function loadProgress(){ return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
function saveProgress(obj){ localStorage.setItem(STORAGE_KEY, JSON.stringify(obj)); showToast('Progresso salvo!'); }
function saveConfig(){ localStorage.setItem(CONFIG_KEY, JSON.stringify(TREINO)); }

function build(){
  const progress = loadProgress();
  daysEl.innerHTML = '';
  
  Object.entries(TREINO).forEach(([day, exs], idx) => {
    const card = document.createElement('article'); card.className = 'day-card';
    const color = ['#ff5f6d','#ffc371','#fff76b','#8cf56b','#5fe3ff'][idx % 5];
    
    card.innerHTML = `
      <div class="day-head">
        <div class="day-title">
          <div class="dot" style="background:${color}"></div>
          <strong>${day}</strong>
        </div>
        <button class="btn ghost toggle-btn">Expandir</button>
      </div>
      <div class="ex-list" style="display:none"></div>
    `;

    const exList = card.querySelector('.ex-list');
    exs.forEach((ex, i) => {
      const row = document.createElement('div'); row.className = 'ex';
      const isChecked = progress[day] && progress[day][ex];
      
      row.innerHTML = `
        <label>${ex}</label>
        <div class="tick ${isChecked?'checked':''}">${isChecked?'✓':''}</div>
        <button class="del-btn" style="background:none; border:none; cursor:pointer">🗑️</button>
      `;

      // Eventos
      row.querySelector('.tick').onclick = () => {
        const cur = loadProgress();
        cur[day] = cur[day] || {};
        const active = !row.querySelector('.tick').classList.contains('checked');
        
        row.querySelector('.tick').classList.toggle('checked');
        row.querySelector('.tick').innerHTML = active ? '✓' : '';
        cur[day][ex] = active;
        saveProgress(cur);
      };

      row.querySelector('label').onclick = () => {
        const newName = prompt('Editar nome:', ex);
        if(newName) { TREINO[day][i] = newName; saveConfig(); build(); }
      };

      row.querySelector('.del-btn').onclick = () => {
        if(confirm('Excluir?')) { TREINO[day].splice(i, 1); saveConfig(); build(); }
      };

      exList.appendChild(row);
    });

    card.querySelector('.toggle-btn').onclick = (e) => {
      const isHidden = exList.style.display === 'none';
      exList.style.display = isHidden ? 'block' : 'none';
      e.target.textContent = isHidden ? 'Recolher' : 'Expandir';
    };

    daysEl.appendChild(card);
  });
}

// Botões de Ação
document.getElementById('clearAll').onclick = () => {
  if(confirm('Zerar marcações?')){ localStorage.removeItem(STORAGE_KEY); build(); }
};

document.getElementById('addEx').onclick = () => {
  const day = prompt('Em qual dia? (Ex: Segunda — Peito/Ombro/Tríceps)');
  if(!TREINO[day]) return alert('Dia não encontrado!');
  const name = prompt('Nome do exercício:');
  if(name) { TREINO[day].push(name); saveConfig(); build(); }
};

document.getElementById('exportBtn').onclick = () => {
  const data = { progress: loadProgress(), config: TREINO };
  const blob = new Blob([JSON.stringify(data)], {type:'application/json'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'rainbow_fitness.json'; a.click();
};

document.getElementById('importBtn').onclick = () => document.getElementById('importFile').click();
document.getElementById('importFile').onchange = async (e) => {
  const file = e.target.files[0];
  if(file){
    const text = await file.text();
    const data = JSON.parse(text);
    if(data.config) {
      TREINO = data.config; saveConfig();
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data.progress));
      build(); showToast('Importado!');
    }
  }
};

// PWA
let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault(); deferredPrompt = e;
  document.getElementById('installBtn').style.display = 'block';
});
document.getElementById('installBtn').onclick = () => {
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(() => { deferredPrompt = null; document.getElementById('installBtn').style.display = 'none'; });
};

if('serviceWorker' in navigator) { 
  navigator.serviceWorker.register('./sw.js').catch(err => console.log(err)); 
}

build();
</script>
</body>
</html>
