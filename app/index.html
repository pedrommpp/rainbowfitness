<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0">
  <title>RainbowFitness — Pro</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ff5f6d">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">

  <style>
    :root { 
      --card-bg: rgba(255,255,255,0.92); 
      --accent: rgba(0,0,0,0.7); 
    }
    
    html, body { margin: 0; padding: 0; min-height: 100vh; font-family: Inter, system-ui, sans-serif; }
    
    /* FUNDO COM DEGRADÊ MÁGICO ANIMADO */
    body {
      background: linear-gradient(-45deg, #ff5f6d, #ffc371, #fff76b, #8cf56b, #5fe3ff, #8a7bff, #ff7bdb);
      background-size: 400% 400%;
      animation: gradient 15s ease infinite;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px;
      box-sizing: border-box;
    }

    @keyframes gradient {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .app {
      width: 100%;
      max-width: 920px;
      background: var(--card-bg);
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.18);
      overflow: hidden;
      backdrop-filter: blur(10px);
      margin-bottom: 40px;
    }

    /* PERFIL ESTILIZADO */
    .profile-header {
      padding: 20px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      background: rgba(255,255,255,0.3);
      border-bottom: 1px solid rgba(0,0,0,0.05);
    }
    .avatar-wrapper {
      width: 60px; height: 60px; border-radius: 15px; overflow: hidden;
      background: #eee; border: 2px solid white; box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      cursor: pointer; flex-shrink: 0;
    }
    .avatar-wrapper img { width: 100%; height: 100%; object-fit: cover; }
    
    .user-info { flex: 1; }
    .user-info input {
      background: transparent; border: none; font-size: 18px; font-weight: 800;
      color: #111; width: 100%; outline: none;
    }
    .user-info p { margin: 0; font-size: 11px; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; font-weight: bold; }

    header { padding: 18px 24px; display: flex; align-items: center; gap: 16px; }
    .logo { width: 40px; height: 40px; background: url('icons/logo.png') center/contain no-repeat; flex-shrink: 0; }
    h1 { margin: 0; font-size: 20px; }
    p.lead { margin: 0; color: var(--accent); font-size: 13px; }
    
    main { padding: 18px 24px; }
    .days { display: grid; grid-template-columns: 1fr; gap: 12px; }
    @media(min-width:820px) { .days { grid-template-columns: repeat(2, 1fr); } }

    /* CARDS IGUAIS À VERSÃO ANTERIOR */
    .day-card { background: linear-gradient(180deg,rgba(255,255,255,0.98),rgba(255,255,255,0.9)); border-radius: 12px; padding: 12px; border: 1px solid rgba(0,0,0,0.05); }
    .day-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .day-title { display: flex; align-items: center; gap: 12px; }
    .dot { width: 12px; height: 12px; border-radius: 4px; }
    
    .ex-list { margin-top: 10px; padding-top: 10px; border-top: 1px dashed rgba(0,0,0,0.04); }
    .ex { display: flex; align-items: center; gap: 12px; padding: 8px 4px; border-bottom: 1px solid rgba(0,0,0,0.02); }
    .ex label { flex: 1; cursor: pointer; font-size: 14px; }
    
    .tick { width: 36px; height: 36px; border-radius: 8px; border: 1px solid rgba(0,0,0,0.06); display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
    .tick.checked { background: linear-gradient(90deg,#6ee7b7,#34d399); color: white; border: none; font-weight: bold; }
    
    .controls { display: flex; gap: 10px; align-items: center; margin-top: 12px; flex-wrap: wrap; margin-bottom: 20px; }
    .btn { padding: 8px 12px; border-radius: 10px; border: none; cursor: pointer; font-weight: 600; font-size: 13px; transition: 0.2s; }
    .btn.ghost { background: transparent; border: 1px solid rgba(0,0,0,0.06); }
    .btn.primary { background: #111; color: white; }
    .btn:active { transform: scale(0.95); }

    .footer { padding: 14px 24px; background: rgba(255,255,255,0.05); font-size: 13px; color: var(--accent); display: flex; justify-content: space-between; align-items: center; border-top: 1px solid rgba(0,0,0,0.03); }
    .small { font-size: 12px; color: #555; }
    .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #111; color: #fff; padding: 10px 14px; border-radius: 10px; opacity: 0; transition: 0.3s; pointer-events: none; z-index: 1000; }
    .toast.show { opacity: 1; }
    input[type='checkbox'] { display: none; }
  </style>
</head>
<body>

<div class="app">
  <div class="profile-header">
    <div class="avatar-wrapper" onclick="document.getElementById('photoInput').click()">
      <img id="userPhoto" src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" alt="Foto">
    </div>
    <input type="file" id="photoInput" hidden accept="image/*">
    <div class="user-info">
      <p>Membro RainbowFitness</p>
      <input type="text" id="userName" value="Seu Nome">
    </div>
    <div class="logo"></div>
  </div>

  <header>
    <div>
      <h1>Treino Interativo</h1>
      <p class="lead">Toque no exercício pra marcar ✅</p>
    </div>
    <button class="btn ghost" id="installBtn" style="display:none; margin-left: auto;">Instalar App</button>
  </header>

  <main>
    <div class="controls">
      <button class="btn primary" id="clearAll">Limpar marcações</button>
      <button class="btn ghost" id="addEx">➕ Adicionar exercício</button>
      <button class="btn ghost" onclick="exportData()">Exportar JSON</button>
    </div>
    <section class="days" id="days"></section>
  </main>

  <footer class="footer">
    <div class="small">Feito com ❤️ RainbowFitness</div>
    <div class="small">Progresso salvo localmente</div>
  </footer>
</div>

<div class="toast" id="toast">Salvo!</div>

<script>
const DEFAULT_TREINO = {
  'Segunda — Peito/Ombro/Tríceps':['Supino reto','Supino inclinado','Crucifixo','Desenvolvimento ombro','Elevação lateral','Tríceps corda'],
  'Terça — Costas/Bíceps':['Puxada frente','Remada baixa','Remada unilateral','Pulldown','Rosca direta'],
  'Quarta — Glúteos/Posteriores':['Agachamento','Leg press','Mesa flexora','Stiff barra','Hip thrust','Cadeira abdutora'],
  'Quinta — Ombro e Core':['Arnold','Elevação lateral','Elevação frontal','Remada alta','Prancha'],
  'Sexta — Glúteos/Posteriores':['Agachamento sumô','Avanço','Cadeira extensora','Stiff romeno','Hip thrust unilateral','Glúteo 4 apoios']
};

const STORAGE_KEY = 'rf_progress_v3';
const CONFIG_KEY = 'rf_config_v3';
const USER_KEY = 'rf_user_v3';

let state = JSON.parse(localStorage.getItem(CONFIG_KEY)) || DEFAULT_TREINO;
let userData = JSON.parse(localStorage.getItem(USER_KEY)) || { name: "Seu Nome", photo: "https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" };

function saveAll() {
  localStorage.setItem(CONFIG_KEY, JSON.stringify(state));
  userData.name = document.getElementById('userName').value;
  localStorage.setItem(USER_KEY, JSON.stringify(userData));
}

function build() {
  const progress = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
  const container = document.getElementById('days');
  container.innerHTML = '';
  document.getElementById('userName').value = userData.name;
  document.getElementById('userPhoto').src = userData.photo;

  Object.entries(state).forEach(([day, exs], idx) => {
    const card = document.createElement('article'); card.className = 'day-card';
    const color = ['#ff5f6d','#ffc371','#fff76b','#8cf56b','#5fe3ff'][idx % 5];
    
    let exHtml = exs.map((ex, i) => {
      const checked = progress[day] && progress[day][ex];
      return `
        <div class="ex">
          <label onclick="editEx('${day}', ${i})">${ex}</label>
          <div class="tick ${checked?'checked':''}" onclick="toggleCheck('${day}', '${ex}', this)">${checked?'✓':''}</div>
          <span onclick="delEx('${day}', ${i})" style="cursor:pointer; opacity:0.2; padding: 5px;">✕</span>
        </div>
      `;
    }).join('');

    card.innerHTML = `
      <div class="day-head">
        <div class="day-title">
          <div class="dot" style="background:${color}"></div>
          <strong>${day}</strong>
        </div>
        <button class="btn ghost" onclick="toggleList(this)">Expandir</button>
      </div>
      <div class="ex-list" style="display:none">${exHtml}</div>
    `;
    container.appendChild(card);
  });
}

function toggleCheck(day, ex, el) {
  const progress = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
  progress[day] = progress[day] || {};
  const active = !el.classList.contains('checked');
  el.classList.toggle('checked');
  el.innerHTML = active ? '✓' : '';
  progress[day][ex] = active;
  localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
  showToast('Salvo!');
}

function toggleList(btn) {
  const list = btn.parentElement.nextElementSibling;
  const isHidden = list.style.display === 'none';
  list.style.display = isHidden ? 'block' : 'none';
  btn.textContent = isHidden ? 'Recolher' : 'Expandir';
}

function editEx(day, i) {
  const n = prompt("Editar exercício:", state[day][i]);
  if(n) { state[day][i] = n; saveAll(); build(); }
}

function delEx(day, i) {
  if(confirm("Excluir exercício?")) { state[day].splice(i, 1); saveAll(); build(); }
}

function showToast(m) {
  const t = document.getElementById('toast'); t.innerText = m;
  t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 1500);
}

document.getElementById('photoInput').onchange = e => {
  const reader = new FileReader();
  reader.onload = () => { userData.photo = reader.result; saveAll(); build(); };
  reader.readAsDataURL(e.target.files[0]);
};

document.getElementById('userName').onblur = saveAll;

document.getElementById('addEx').onclick = () => {
  const d = prompt("Em qual dia deseja adicionar?");
  if(!state[d]) return alert("Dia não encontrado! Escreva exatamente como está no título.");
  const n = prompt("Nome do exercício:");
  if(n) { state[d].push(n); saveAll(); build(); }
};

document.getElementById('clearAll').onclick = () => {
  if(confirm("Deseja zerar todas as marcações de hoje?")) { localStorage.removeItem(STORAGE_KEY); build(); }
};

function exportData() {
  const data = { progress: JSON.parse(localStorage.getItem(STORAGE_KEY)), config: state, user: userData };
  const blob = new Blob([JSON.stringify(data)], {type:'application/json'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'backup_rainbowfitness.json'; a.click();
}

let defP;
window.addEventListener('beforeinstallprompt', e => { e.preventDefault(); defP = e; document.getElementById('installBtn').style.display='block'; });
document.getElementById('installBtn').onclick = () => { defP.prompt(); defP.userChoice.then(()=> {defP=null; document.getElementById('installBtn').style.display='none';}); };
if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');

build();
</script>
</body>
</html>
